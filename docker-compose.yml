# docker-compose.yml
#
# PURPOSE: Runs all 5 services together for local development.
# This simulates the production environment on your machine.
#
# USAGE:
#   Start all:       docker compose up --build
#   Start detached:  docker compose up --build -d
#   Stop all:        docker compose down
#   View logs:       docker compose logs -f
#   One service:     docker compose logs -f user-service
#
# MICROSERVICE PRINCIPLE:
#   Each service is completely isolated — separate process, separate database,
#   separate container. They communicate ONLY over the defined network via HTTP.
#   No service ever imports code from another service.

version: "3.9"

# Shared network — services discover each other by their service name.
# e.g. from order-service, you reach user-service at http://user-service:3001
networks:
  quickbite-network:
    driver: bridge

services:

  # ════════════════════════════════════════════════════════
  # USER SERVICE — handles authentication and user profiles
  # Tech: Node.js + Express + MongoDB
  # ════════════════════════════════════════════════════════
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: quickbite-user
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - USER_SERVICE_PORT=3001
      - NODE_ENV=development
    networks:
      - quickbite-network
    healthcheck:
      # wget is available in alpine images, curl may not be
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # MENU SERVICE — restaurant catalog and menu items
  # Tech: Python + FastAPI + MongoDB
  # ════════════════════════════════════════════════════════
  menu-service:
    build:
      context: ./menu-service
      dockerfile: Dockerfile
    container_name: quickbite-menu
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MENU_SERVICE_PORT=8001
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # ORDER SERVICE — order creation and management
  # Tech: Node.js + Express + MongoDB
  # Depends on: user-service (JWT validation), menu-service (item validation)
  # ════════════════════════════════════════════════════════
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: quickbite-order
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - ORDER_SERVICE_PORT=3002
      - NODE_ENV=development
      - USER_SERVICE_URL=http://user-service:3001
      - MENU_SERVICE_URL=http://menu-service:8001
    networks:
      - quickbite-network
    depends_on:
      user-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # NOTIFY SERVICE — email notifications via SendGrid
  # Tech: Python + FastAPI + Azure Service Bus consumer
  # ════════════════════════════════════════════════════════
  notify-service:
    build:
      context: ./notify-service
      dockerfile: Dockerfile
    container_name: quickbite-notify
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - NOTIFY_SERVICE_PORT=8002
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # FRONTEND — React SPA (development server only)
  # NOTE: In production this is on Azure Static Web Apps,
  #       NOT a container. This is for local dev only.
  # ════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: quickbite-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    volumes:
      # Hot reload — changes to src/ reflect immediately without rebuilding
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      user-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    networks:
      - quickbite-network
    restart: unless-stopped
