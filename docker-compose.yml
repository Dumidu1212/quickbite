# docker-compose.yml
#
# Local development stack — all 5 services running in containers.
#
# NETWORKING:
#   All services are on the 'quickbite-network' bridge network.
#   Inside this network, services reach each other by SERVICE NAME not localhost.
#   e.g. user-service calls http://menu-service:8001/restaurants
#        order-service calls http://user-service:3001/auth/validate
#
# ENVIRONMENT VARIABLES:
#   Each service reads from its own .env file via env_file.
#   Service URLs are OVERRIDDEN here to use container names.
#   This overrides the localhost URLs in the .env files.
#
# HEALTH CHECKS:
#   Each service has a health check so dependent services wait
#   for the upstream service to be ready before starting.
#
# VOLUMES:
#   No volumes for source code — we copy code into the image at build time.
#   This is the production pattern. Use Dockerfile.dev for hot-reload dev.

version: "3.9"

services:
  # ── User service ────────────────────────────────────────────────────────────
  user-service:
    image: quickbite-user:latest
    container_name: quickbite-user
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    environment:
      # Override localhost URLs to use container names inside the network
      NODE_ENV: production
      USER_SERVICE_PORT: "3001"
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Menu service ────────────────────────────────────────────────────────────
  menu-service:
    image: quickbite-menu:latest
    container_name: quickbite-menu
    ports:
      - "8001:8001"
    env_file:
      - ./menu-service/.env
    environment:
      MENU_SERVICE_PORT: "8001"
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Order service ────────────────────────────────────────────────────────────
  order-service:
    image: quickbite-order:latest
    container_name: quickbite-order
    ports:
      - "3002:3002"
    env_file:
      - ./order-service/.env
    environment:
      NODE_ENV: production
      ORDER_SERVICE_PORT: "3002"
      # Override localhost URLs — inside docker network use container names
      USER_SERVICE_URL: http://user-service:3001
      MENU_SERVICE_URL: http://menu-service:8001
    depends_on:
      user-service:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Notify service ───────────────────────────────────────────────────────────
  notify-service:
    image: quickbite-notify:latest
    container_name: quickbite-notify
    ports:
      - "8002:8002"
    env_file:
      - ./notify-service/.env
    environment:
      NOTIFY_SERVICE_PORT: "8002"
    networks:
      - quickbite-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # NOTE: Frontend runs on the HOST machine via npm run dev (Vite dev server)
  # during development — not in Docker. This is because:
  #   1. Vite HMR (hot module replacement) does not work well in containers
  #   2. The Vite dev proxy handles routing to the correct backend services
  #   3. The frontend build for production is deployed to Azure Static Web Apps
  # To build the frontend image for production, use frontend/Dockerfile.

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  quickbite-network:
    driver: bridge
    name: quickbite-network
