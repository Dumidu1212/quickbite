# .github/workflows/azure-static-web-apps.yml
name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
        env:
          VITE_USER_SERVICE_URL: https://user-service.whitestone-78c51921.southeastasia.azurecontainerapps.io
          VITE_MENU_SERVICE_URL: https://menu-service.whitestone-78c51921.southeastasia.azurecontainerapps.io
          VITE_ORDER_SERVICE_URL: https://order-service.whitestone-78c51921.southeastasia.azurecontainerapps.io
