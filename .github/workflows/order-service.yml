# .github/workflows/order-service.yml
name: Order Service CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'order-service/**'
      - '.github/workflows/order-service.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'order-service/**'
      - '.github/workflows/order-service.yml'
  workflow_dispatch:

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: order-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test
          ORDER_SERVICE_PORT: '3002'
          USER_SERVICE_URL: http://localhost:3001
          MENU_SERVICE_URL: http://localhost:8001
          SERVICEBUS_CONN: ''
          SERVICEBUS_QUEUE_NAME: order-events
          ADMIN_KEY: test-admin-key
          MONGODB_URI_ORDERS: mongodb://localhost:27017/test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: order-service-coverage
          path: order-service/coverage/
          retention-days: 7

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: order-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: order-service

      - name: Run tests for coverage
        run: npm test
        working-directory: order-service
        env:
          NODE_ENV: test
          ORDER_SERVICE_PORT: '3002'
          USER_SERVICE_URL: http://localhost:3001
          MENU_SERVICE_URL: http://localhost:8001
          SERVICEBUS_CONN: ''
          SERVICEBUS_QUEUE_NAME: order-events
          ADMIN_KEY: test-admin-key
          MONGODB_URI_ORDERS: mongodb://localhost:27017/test


  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, sonar]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-order
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
