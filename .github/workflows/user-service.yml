# .github/workflows/user-service.yml
#
# CI/CD pipeline for the User service.
#
# TRIGGERS:
#   - Push to main or dev that changes user-service files
#   - Pull request to main or dev that changes user-service files
#   - Manual trigger via workflow_dispatch
#
# STAGES:
#   1. test    — run Jest tests with MongoDB Memory Server
#   2. sonar   — SonarCloud static analysis and quality gate
#   3. docker  — build and push image to Docker Hub (main branch only)

name: User Service CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'user-service/**'
      - '.github/workflows/user-service.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'user-service/**'
      - '.github/workflows/user-service.yml'
  workflow_dispatch:

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          # Tests use MongoDB Memory Server — no real DB connection needed
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci-only
          JWT_EXPIRES_IN: 24h
          BCRYPT_ROUNDS: '4'
          USER_SERVICE_PORT: '3001'
          # MongoDB Memory Server creates its own URI — this is a placeholder
          MONGODB_URI_USERS: mongodb://localhost:27017/test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: user-service-coverage
          path: user-service/coverage/
          retention-days: 7

  # ── Job 2: SonarCloud ───────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # SonarCloud needs full git history for accurate blame and new code detection
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests to generate coverage for SonarCloud
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci-only
          JWT_EXPIRES_IN: 24h
          BCRYPT_ROUNDS: '4'
          USER_SERVICE_PORT: '3001'
          MONGODB_URI_USERS: mongodb://localhost:27017/test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: user-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 3: Docker Build & Push ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, sonar]
    # Only push to Docker Hub on pushes to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/quickbite-user
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds to speed up subsequent pushes
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
