openapi: "3.0.3"
info:
  title: QuickBite User Service
  version: "1.0.0"
  description: Handles user registration, authentication, and profile management

servers:
  - url: http://localhost:3001
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200": { description: Service healthy }
        "503": { description: Database unavailable }

  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: Dumidu Perera }
                email: { type: string, format: email, example: dumidu@quickbite.com }
                password: { type: string, minLength: 8, example: SecurePass123 }
      responses:
        "201": { description: User created successfully }
        "400": { description: Validation error }
        "409": { description: Email already registered }

  /auth/login:
    post:
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200": { description: Login successful, returns JWT token }
        "401": { description: Invalid credentials }
        "429": { description: Too many login attempts }

  /auth/validate:
    get:
      summary: Validate a JWT token (called by other services)
      security:
        - bearerAuth: []
      responses:
        "200": { description: Returns valid true/false with userId }

  /auth/logout:
    post:
      summary: Invalidate current JWT
      security:
        - bearerAuth: []
      responses:
        "200": { description: Logged out successfully }

  /users/profile:
    get:
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200": { description: User profile object }
        "401": { description: Unauthorized }
    put:
      summary: Update user profile
      security:
        - bearerAuth: []
      responses:
        "200": { description: Updated profile }
        "401": { description: Unauthorized }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
