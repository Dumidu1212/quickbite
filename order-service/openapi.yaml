openapi: "3.0.3"
info:
  title: QuickBite Order Service
  version: "1.0.0"
  description: Order creation and management

servers:
  - url: http://localhost:3002
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200": { description: Service healthy }

  /orders:
    post:
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restaurantId, items, deliveryAddress]
              properties:
                restaurantId: { type: string }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId: { type: string }
                      quantity: { type: integer, minimum: 1 }
                deliveryAddress:
                  type: object
                  properties:
                    street: { type: string }
                    city: { type: string }
                    phone: { type: string }
      responses:
        "201": { description: Order created }
        "400": { description: Validation error }
        "401": { description: Invalid or missing JWT }

  /orders/{id}:
    get:
      summary: Get order by ID
      security:
        - bearerAuth: []
      responses:
        "200": { description: Order object }
        "404": { description: Order not found }

  /orders/{id}/status:
    put:
      summary: Update order status (admin only)
      parameters:
        - in: header
          name: X-Admin-Key
          required: true
          schema: { type: string }
      responses:
        "200": { description: Updated order }
        "403": { description: Forbidden }

  /orders/user/{userId}:
    get:
      summary: Get order history for a user
      security:
        - bearerAuth: []
      responses:
        "200": { description: Array of orders }
        "403": { description: JWT userId does not match }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
